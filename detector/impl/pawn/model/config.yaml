model:
  primary_model_name: meta-llama/Llama-3.2-1B-Instruct
  second_model_name: meta-llama/Llama-3.2-1B
  max_length: 512
  metric_features: 256
  gates: 256
  mlp_hidden_features: 256
  mlp_hidden_layers: 3
  mlp_dropout: 0.0
  token_dropout: 0.15
  residual: true
  primary_model_metrics:
    - entropy
    - max_log_probs
    - next_token_log_probs
    - rank
    - top_p
  second_model_metrics:
    - entropy
    - max_log_probs
    - next_token_log_probs
    - rank
    - top_p
  return_xppl: true
  return_second_model_hs: true
  hidden_state_fusion: uniform
  primary_model_agg_metrics:
    - energy
    - mean
    - std
    - var
    - skew
    - kurtosis
    - mean_diff
    - std_diff
    - var_2nd
    - entropy_2nd
    - autocorr_2nd
  second_model_agg_metrics:
    - energy
    - mean
    - std
    - var
    - skew
    - kurtosis
    - mean_diff
    - std_diff
    - var_2nd
    - entropy_2nd
    - autocorr_2nd
  second_model_agg_metrics:
    - energy
    - mean
    - std
    - var
    - skew
    - kurtosis
    - mean_diff
    - std_diff
    - var_2nd
    - entropy_2nd
    - autocorr_2nd
  cross_model_agg_features:
    - cov
    - corr
    - cos_sim
    - binoculars_score

optimizer:
  learning_rate: 1.0e-3
  weight_decay: 1.0e-2
  max_grad_norm: 1.0
  gradient_accumulation_steps: 1

trainer:
  device: null
  seed: 42
  epochs: 5

data:
  batch_size: 32
  eval_batch_size: 32