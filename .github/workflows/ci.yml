name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.5.18"
  PYTHON_VERSION: "3.13"

jobs:
  lint-and-test:
    name: Lint + type-check + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies (backend + bot + dev, no ml)
        run: uv sync --frozen --extra backend --extra bot --group dev

      - name: Ruff
        run: uv run ruff check .

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest -ra

  smoke:
    name: Backend E2E smoke (stub model)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install backend deps (no ml)
        run: uv sync --frozen --extra backend

      - name: Run smoke script
        env:
          MODELS_CONFIG_PATH: ./models.yaml
          LOG_LEVEL: WARNING
          KEEP_LOG: "1"
        run: bash scripts/smoke.sh

  docker-bot-build:
    name: Build bot image
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build bot image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/bot.Dockerfile
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
